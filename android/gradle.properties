org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Agora 6.5.4: iris-rtc + agora-special-full AAR'lari ayni 'io.agora.rtc'
# namespace'ini paylasiyor; bu kontrolu gevsetmeyi dene (AGP namespace cakismasi).
android.uniquePackageNames=false
# Kaynak optimizasyonu res/raw bildirim seslerini "kullanilmiyor" sanip
# silebiliyor (koddan string adiyla cagriliyorlar). KAPALI = sesler APK'da kalir.
android.enableResourceOptimizations=false
